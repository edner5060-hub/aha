<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>x_x</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=2070&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
}

.container{
    display:flex;
    gap:40px;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

.profile{
    width:180px;
    height:220px;
    text-align:center;
    padding:20px;
    border-radius:20px;
    position:relative;
    background:rgba(0,0,0,0.8);
    border:3px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(5px);
    transition:transform 0.3s ease;
}

.profile:hover {
    transform:scale(1.05);
    border-color:rgba(255,255,255,0.4);
}

.pfp{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid white;
}

.name{
    color:white;
    font-size:20px;
    margin-top:15px;
    font-weight:bold;
    text-shadow:2px 2px 4px rgba(0,0,0,0.5);
    font-family: 'Courier New', monospace;
    white-space: nowrap;
    overflow: hidden;
    border-right: 2px solid white;
    animation: blink-cursor 0.75s step-end infinite;
}

@keyframes blink-cursor {
    from, to { border-color: transparent; }
    50% { border-color: white; }
}

/* Snowfall */
.snowflake {
    position: absolute;
    color: white;
    font-size: 1px;
    pointer-events: none;
    animation: snowfall linear infinite;
    opacity: 0.8;
    z-index:10;
}

@keyframes snowfall {
    0% {
        transform: translateY(-100vh) rotate(0deg);
        opacity: 1;
    }
    100% {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>
<!-- Snowfall container -->
<div id="snow-container"></div>

<!-- Music Player with direct GitHub raw link -->
<audio id="bgMusic" loop preload="auto">
    <source src="https://github.com/edner5060-hub/aha/blob/main/song" type="audio/mpeg">
    <!-- Fallback path if the raw link doesn't work -->
    <source src="song" type="audio/mpeg">
</audio>

<div class="container">
<div class="profile">
<img class="pfp" src="https://cdn.discordapp.com/avatars/602243853571063838/a352019ca90d767b57c98a93bed74e54.webp?size=1024">
<div class="name" id="name1">Emre</div>
</div>

<div class="profile">
<img class="pfp" src="https://cdn.discordapp.com/avatars/1420202850818064516/bafc5a1c05f4f615754c7a06cd906f4b.webp?size=1024">
<div class="name" id="name2">Charlie</div>
</div>

<div class="profile">
<img class="pfp" src="https://cdn.discordapp.com/avatars/1435059969241251880/c8da704778a0e8b830abd61c3615878f.webp?size=1024">
<div class="name" id="name3">Ethan</div>
</div>

<div class="profile">
<img class="pfp" src="https://cdn.discordapp.com/avatars/1412691167073538089/f79e8c7ac5ed47f64b4946677be6b548.webp?size=1024">
<div class="name" id="name4">Zes</div>
</div>
</div>

<script>
// MUSIC - AGGRESSIVE AUTOPLAY
const audio = document.getElementById('bgMusic');
audio.volume = 0.3;

// Function to force play music
function forcePlayMusic() {
    audio.play()
        .then(() => {
            console.log('Music is playing!');
        })
        .catch(() => {
            console.log('Retrying music...');
            setTimeout(forcePlayMusic, 100);
        });
}

// Try every possible event
forcePlayMusic();
window.addEventListener('load', forcePlayMusic);
document.addEventListener('click', forcePlayMusic);
document.addEventListener('touchstart', forcePlayMusic);
document.addEventListener('keydown', forcePlayMusic);

// Aggressive retry interval
let attempts = 0;
const musicInterval = setInterval(() => {
    audio.play()
        .then(() => {
            clearInterval(musicInterval);
        })
        .catch(() => {});
    
    attempts++;
    if (attempts > 100) clearInterval(musicInterval); // Stop after 10 seconds
}, 100);

// Snowfall effect
function createSnowflake() {
    const snowflake = document.createElement('div');
    snowflake.className = 'snowflake';
    snowflake.innerHTML = '❄';
    snowflake.style.left = Math.random() * 100 + 'vw';
    snowflake.style.animationDuration = (Math.random() * 3 + 2) + 's';
    snowflake.style.opacity = Math.random() * 0.5 + 0.3;
    snowflake.style.fontSize = (Math.random() * 5 + 5) + 'px';
    document.getElementById('snow-container').appendChild(snowflake);
    
    setTimeout(() => {
        snowflake.remove();
    }, 5000);
}

setInterval(createSnowflake, 100);

// Typewriter effects for profile names only
const names = [
    { element: document.getElementById('name1'), text: 'Emre ' },
    { element: document.getElementById('name2'), text: 'Charlie ' },
    { element: document.getElementById('name3'), text: 'Ethan ' },
    { element: document.getElementById('name4'), text: 'Zes ' }
];

function typeWriterName(nameObj) {
    let index = 0;
    let displayText = '';
    let isDeleting = false;
    
    function type() {
        if (!isDeleting) {
            if (index < nameObj.text.length) {
                displayText += nameObj.text.charAt(index);
                nameObj.element.innerHTML = displayText;
                index++;
                setTimeout(type, 150);
            } else {
                isDeleting = true;
                setTimeout(type, 1000);
            }
        } else {
            if (index > 0) {
                displayText = displayText.slice(0, -1);
                nameObj.element.innerHTML = displayText;
                index--;
                setTimeout(type, 100);
            } else {
                isDeleting = false;
                setTimeout(type, 200);
            }
        }
    }
    
    type();
}

// Start profile name animations
names.forEach((name, i) => {
    setTimeout(() => {
        typeWriterName(name);
    }, i * 500);
});

// Check if audio file loads
audio.addEventListener('error', (e) => {
    console.log('Trying alternative music source...');
    // If GitHub raw fails, try the local path (already included as fallback)
});

audio.addEventListener('canplay', () => {
    console.log('Audio file loaded successfully');
});
</script>

</body>
</html>
