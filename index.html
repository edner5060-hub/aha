<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profiles</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=2070&auto=format&fit=crop'); /* Dark forest background */
    background-size:cover;
    background-position:center;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
}

.container{
    display:flex;
    gap:40px;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

.profile{
    width:180px;
    height:220px;
    text-align:center;
    padding:20px;
    border-radius:20px;
    position:relative;
    background:rgba(0,0,0,0.8);
    border:3px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(5px);
    transition:transform 0.3s ease;
}

.profile:hover {
    transform:scale(1.05);
    border-color:rgba(255,255,255,0.4);
}

.pfp{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid white;
}

.name{
    color:white;
    font-size:20px;
    margin-top:15px;
    font-weight:bold;
    text-shadow:2px 2px 4px rgba(0,0,0,0.5);
}

/* Snowfall */
.snowflake {
    position: absolute;
    color: white;
    font-size: 1px;
    pointer-events: none;
    animation: snowfall linear infinite;
    opacity: 0.8;
    z-index:10;
}

@keyframes snowfall {
    0% {
        transform: translateY(-100vh) rotate(0deg);
        opacity: 1;
    }
    100% {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}

/* Hidden audio element */
#bgMusic {
    display:none;
}
</style>
</head>

<body>
<!-- Snowfall container -->
<div id="snow-container"></div>

<!-- Hidden Music Player (auto-plays) -->
<audio id="bgMusic" loop autoplay>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    <!-- Using a sample music URL that will work -->
</audio>

<div class="container">
<div class="profile">
<img class="pfp" src="https://cdn.discordapp.com/avatars/602243853571063838/a352019ca90d767b57c98a93bed74e54.webp?size=1024">
<div class="name">Emre</div>
</div>

<div class="profile">
<img class="pfp" src="https://cdn.discordapp.com/avatars/1420202850818064516/bafc5a1c05f4f615754c7a06cd906f4b.webp?size=1024">
<div class="name">Charlie</div>
</div>

<div class="profile">
<img class="pfp" src="https://cdn.discordapp.com/avatars/1435059969241251880/e64ea35632e04fd2b2033d3da7f1ccce.webp?size=1024">
<div class="name">Ethan</div>
</div>

<div class="profile">
<img class="pfp" src="https://cdn.discordapp.com/avatars/1412691167073538089/f79e8c7ac5ed47f64b4946677be6b548.webp?size=1024">
<div class="name">Zes</div>
</div>
</div>

<script>
// Snowfall effect
function createSnowflake() {
    const snowflake = document.createElement('div');
    snowflake.className = 'snowflake';
    snowflake.innerHTML = '❄';
    snowflake.style.left = Math.random() * 100 + 'vw';
    snowflake.style.animationDuration = (Math.random() * 3 + 2) + 's';
    snowflake.style.opacity = Math.random() * 0.5 + 0.3;
    snowflake.style.fontSize = (Math.random() * 5 + 5) + 'px';
    document.getElementById('snow-container').appendChild(snowflake);
    
    setTimeout(() => {
        snowflake.remove();
    }, 5000);
}

setInterval(createSnowflake, 100);

// Ensure audio plays (some browsers block autoplay)
const audio = document.getElementById('bgMusic');

// Try to play audio when page loads
window.addEventListener('load', function() {
    audio.play().catch(function(error) {
        console.log("Autoplay was prevented. Click anywhere to play music.");
        // Create a one-time click handler to play audio
        document.body.addEventListener('click', function playOnClick() {
            audio.play();
            document.body.removeEventListener('click', playOnClick);
        }, { once: true });
    });
});
</script>

</body>
</html>
