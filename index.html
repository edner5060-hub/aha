<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profiles</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:url("[static.vecteezy.com](https://static.vecteezy.com/system/resources/thumbnails/072/689/332/small/a-dark-forest-of-pine-trees-is-silhouetted-against-a-misty-gray-sky-creating-an-atmospheric-and-mysterious-landscape-scene-photo.jpg)");
    background-size:cover;
    background-position:center;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
}

.container{
    display:flex;
    gap:40px;
}

.profile{
    width:180px;
    height:220px;
    text-align:center;
    padding:20px;
    border-radius:20px;
    position:relative;
    background:rgba(0,0,0,0.8);
    border:3px solid transparent;
    background-clip:padding-box;
}

.profile::before{
    content:"";
    position:absolute;
    inset:-3px;
    border-radius:20px;
    background:linear-gradient(
        45deg,
        red, orange, yellow, green, cyan, blue, violet, red
    );
    background-size:400%;
    animation:rainbow 6s linear infinite;
    z-index:-1;
}

@keyframes rainbow{
    0%{background-position:0%}
    100%{background-position:400%}
}

.pfp{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
}

.name{
    color:white;
    font-size:20px;
    margin-top:15px;
}

/* Snowfall */
.snowflake {
    position: absolute;
    color: white;
    font-size: 1px;
    pointer-events: none;
    animation: snowfall linear infinite;
    opacity: 0.8;
}

@keyframes snowfall {
    0% {
        transform: translateY(-100vh) rotate(0deg);
        opacity: 1;
    }
    100% {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}

/* Music Player */
.music-controls {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.7);
    padding: 15px;
    border-radius: 15px;
    border: 2px solid transparent;
    background-clip: padding-box;
}

.music-controls::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 15px;
    background: linear-gradient(45deg, red, orange, yellow, green, cyan, blue, violet, red);
    background-size: 400%;
    animation: rainbow 6s linear infinite;
    z-index: -1;
}

.music-controls {
    position: relative;
}

.play-btn, .pause-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
    margin: 0 5px;
    font-size: 14px;
}

.play-btn:hover, .pause-btn:hover {
    background: rgba(255,255,255,0.4);
}
</style>
</head>

<body>
<!-- Snowfall container -->
<div id="snow-container"></div>

<!-- Music Player -->
<div class="music-controls">
    <button class="play-btn" onclick="playMusic()">▶ Play</button>
    <button class="pause-btn" onclick="pauseMusic()" style="display:none;">⏸ Pause</button>
    <audio id="bgMusic" loop>
        <source src="YOUR_MUSIC_FILE.mp3" type="audio/mpeg">
        <!-- Replace YOUR_MUSIC_FILE.mp3 with your music file path -->
    </audio>
</div>

<div class="container">
<div class="profile">
<img class="pfp" src="[cdn.discordapp.com](https://cdn.discordapp.com/avatars/602243853571063838/a352019ca90d767b57c98a93bed74e54.webp?size=1024)">
<div class="name">Emre</div>
</div>

<div class="profile">
<img class="pfp" src="[cdn.discordapp.com](https://cdn.discordapp.com/avatars/1420202850818064516/bafc5a1c05f4f615754c7a06cd906f4b.webp?size=1024)">
<div class="name">Charlie</div>
</div>

<div class="profile">
<img class="pfp" src="[cdn.discordapp.com](https://cdn.discordapp.com/avatars/1435059969241251880/e64ea35632e04fd2b2033d3da7f1ccce.webp?size=1024)">
<div class="name">Ethan</div>
</div>

<div class="profile">
<img class="pfp" src="[cdn.discordapp.com](https://cdn.discordapp.com/avatars/1412691167073538089/f79e8c7ac5ed47f64b4946677be6b548.webp?size=1024)">
<div class="name">Zes</div>
</div>
</div>

<script>
// Snowfall effect
function createSnowflake() {
    const snowflake = document.createElement('div');
    snowflake.className = 'snowflake';
    snowflake.innerHTML = '❄';
    snowflake.style.left = Math.random() * 100 + 'vw';
    snowflake.style.animationDuration = (Math.random() * 3 + 2) + 's';
    snowflake.style.opacity = Math.random() * 0.5 + 0.3;
    snowflake.style.fontSize = (Math.random() * 5 + 5) + 'px';
    document.getElementById('snow-container').appendChild(snowflake);
    
    setTimeout(() => {
        snowflake.remove();
    }, 5000);
}

setInterval(createSnowflake, 100);

// Music controls
const audio = document.getElementById('bgMusic');
let isPlaying = false;

function playMusic() {
    audio.play();
    document.querySelector('.play-btn').style.display = 'none';
    document.querySelector('.pause-btn').style.display = 'inline-block';
    isPlaying = true;
}

function pauseMusic() {
    audio.pause();
    document.querySelector('.play-btn').style.display = 'inline-block';
    document.querySelector('.pause-btn').style.display = 'none';
    isPlaying = false;
}
</script>

</body>
</html>
