<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card with Rainbow Border & Snow</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #1e1e1e; /* dark background for contrast */
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .profile-card {
    position: relative;
    width: 250px;
    height: 350px;
    padding: 20px;
    background: rgba(255, 255, 255, 0.85); /* clearer background */
    border: 5px solid;
    border-radius: 15px;
    overflow: hidden;
    text-align: center;
    animation: rainbowBorder 20s linear infinite;
  }

  .name {
    text-transform: lowercase;
    font-size: 24px;
    margin-top: 50px;
    color: #333;
  }

  .info {
    font-size: 16px;
    color: #555;
  }

  @keyframes rainbowBorder {
    0% { border-image: linear-gradient(0deg, red, orange, yellow, green, blue, indigo, violet) 1; }
    100% { border-image: linear-gradient(360deg, red, orange, yellow, green, blue, indigo, violet) 1; }
  }

  /* Snowflake container */
  .snowflakes {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
  }

  .snowflake {
    position: absolute;
    top: -10px;
    color: white;
    user-select: none;
    pointer-events: none;
    font-size: 1em;
    opacity: 0.8;
    animation-name: fall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }

  @keyframes fall {
    0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(360px) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="profile-card">
  <div class="snowflakes" id="snowflakes"></div>
  <h2 class="name">leah</h2>
  <p class="info">age: 15</p>
</div>

<script>
  const snowContainer = document.getElementById('snowflakes');
  const snowflakeCount = 20;

  for (let i = 0; i < snowflakeCount; i++) {
    const snowflake = document.createElement('div');
    snowflake.classList.add('snowflake');
    snowflake.textContent = '❄';
    
    // Random position and size
    snowflake.style.left = Math.random() * 100 + '%';
    snowflake.style.fontSize = (Math.random() * 10 + 10) + 'px';
    
    // Random animation duration (fall speed)
    snowflake.style.animationDuration = (Math.random() * 10 + 8) + 's';
    
    // Random delay for natural snowfall
    snowflake.style.animationDelay = Math.random() * 10 + 's';
    
    snowContainer.appendChild(snowflake);
  }
</script>

</body>
</html>
