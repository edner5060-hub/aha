<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>x_x</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=2070&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
}

.container{
    display:flex;
    gap:40px;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

.profile{
    width:180px;
    height:220px;
    text-align:center;
    padding:20px;
    border-radius:20px;
    position:relative;
    background:rgba(0,0,0,0.8);
    border:3px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(5px);
    transition:transform 0.3s ease;
}

.profile:hover {
    transform:scale(1.05);
    border-color:rgba(255,255,255,0.4);
}

.pfp{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid white;
}

.name{
    color:white;
    font-size:20px;
    margin-top:15px;
    font-weight:bold;
    text-shadow:2px 2px 4px rgba(0,0,0,0.5);
    font-family: 'Courier New', monospace;
    white-space: nowrap;
    overflow: hidden;
    border-right: 2px solid white;
    animation: blink-cursor 0.75s step-end infinite;
}

@keyframes blink-cursor {
    from, to { border-color: transparent; }
    50% { border-color: white; }
}

/* Snowfall */
.snowflake {
    position: absolute;
    color: white;
    font-size: 1px;
    pointer-events: none;
    animation: snowfall linear infinite;
    opacity: 0.8;
    z-index:10;
}

@keyframes snowfall {
    0% {
        transform: translateY(-100vh) rotate(0deg);
        opacity: 1;
    }
    100% {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}

/* Hidden audio element */
#bgMusic {
    display:none;
}
</style>
</head>

<body>
<!-- Snowfall container -->
<div id="snow-container"></div>

<!-- Music Player with working autoplay -->
<audio id="bgMusic" loop preload="auto">
    <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="container">
<div class="profile">
<img class="pfp" src="https://cdn.discordapp.com/avatars/602243853571063838/a352019ca90d767b57c98a93bed74e54.webp?size=1024">
<div class="name" id="name1">Emre</div>
</div>

<div class="profile">
<img class="pfp" src="https://cdn.discordapp.com/avatars/1420202850818064516/bafc5a1c05f4f615754c7a06cd906f4b.webp?size=1024">
<div class="name" id="name2">Charlie</div>
</div>

<div class="profile">
<img class="pfp" src="https://cdn.discordapp.com/avatars/1435059969241251880/c8da704778a0e8b830abd61c3615878f.webp?size=1024">
<div class="name" id="name3">Ethan</div>
</div>

<div class="profile">
<img class="pfp" src="https://cdn.discordapp.com/avatars/1412691167073538089/f79e8c7ac5ed47f64b4946677be6b548.webp?size=1024">
<div class="name" id="name4">Zes</div>
</div>
</div>

<script>
// FIXED: Music autoplay that actually works
const audio = document.getElementById('bgMusic');

// Set volume
audio.volume = 0.5;

// Function to attempt playing audio
function attemptPlay() {
    audio.play()
        .then(() => {
            console.log('Music playing successfully');
        })
        .catch(error => {
            console.log('Autoplay prevented, retrying...', error);
            // Try again after a short delay
            setTimeout(attemptPlay, 500);
        });
}

// Start playing immediately
attemptPlay();

// Also try on page load
window.addEventListener('load', attemptPlay);

// Try on any user interaction as backup
document.addEventListener('click', () => {
    audio.play();
}, { once: true });

document.addEventListener('touchstart', () => {
    audio.play();
}, { once: true });

// FIXED: Tab title typewriter - NO URL FLASH
const titleText = 'x_x ';
let titleIndex = 0;
let currentTitle = '';
let isDeleting = false;

// Set initial title immediately
document.title = '';

function updateTabTitle() {
    if (!isDeleting) {
        // Typing mode
        if (titleIndex < titleText.length) {
            currentTitle += titleText[titleIndex];
            document.title = currentTitle;
            titleIndex++;
            setTimeout(updateTabTitle, 200);
        } else {
            // Finished typing, switch to deleting after pause
            isDeleting = true;
            setTimeout(updateTabTitle, 1000);
        }
    } else {
        // Deleting mode
        if (titleIndex > 0) {
            currentTitle = currentTitle.slice(0, -1);
            document.title = currentTitle;
            titleIndex--;
            setTimeout(updateTabTitle, 100);
        } else {
            // Finished deleting, switch back to typing
            isDeleting = false;
            setTimeout(updateTabTitle, 200);
        }
    }
}

// Start the tab title animation after a tiny delay
setTimeout(updateTabTitle, 100);

// Snowfall effect
function createSnowflake() {
    const snowflake = document.createElement('div');
    snowflake.className = 'snowflake';
    snowflake.innerHTML = '❄';
    snowflake.style.left = Math.random() * 100 + 'vw';
    snowflake.style.animationDuration = (Math.random() * 3 + 2) + 's';
    snowflake.style.opacity = Math.random() * 0.5 + 0.3;
    snowflake.style.fontSize = (Math.random() * 5 + 5) + 'px';
    document.getElementById('snow-container').appendChild(snowflake);
    
    setTimeout(() => {
        snowflake.remove();
    }, 5000);
}

setInterval(createSnowflake, 100);

// Typewriter effects for profile names
const names = [
    { element: document.getElementById('name1'), text: 'Emre ' },
    { element: document.getElementById('name2'), text: 'Charlie ' },
    { element: document.getElementById('name3'), text: 'Ethan ' },
    { element: document.getElementById('name4'), text: 'Zes ' }
];

function typeWriterName(nameObj) {
    let index = 0;
    let displayText = '';
    let isDeleting = false;
    
    function type() {
        if (!isDeleting) {
            // Typing
            if (index < nameObj.text.length) {
                displayText += nameObj.text.charAt(index);
                nameObj.element.innerHTML = displayText;
                index++;
                setTimeout(type, 150);
            } else {
                // Switch to deleting
                isDeleting = true;
                setTimeout(type, 1000);
            }
        } else {
            // Deleting
            if (index > 0) {
                displayText = displayText.slice(0, -1);
                nameObj.element.innerHTML = displayText;
                index--;
                setTimeout(type, 100);
            } else {
                // Switch back to typing
                isDeleting = false;
                setTimeout(type, 200);
            }
        }
    }
    
    type();
}

// Start profile name animations
names.forEach((name, i) => {
    setTimeout(() => {
        typeWriterName(name);
    }, i * 500);
});

// Check if audio file exists
audio.addEventListener('error', (e) => {
    console.log('Audio file not found, make sure song.mp3 is in the same folder');
    // Try to reload and play again
    setTimeout(() => {
        audio.load();
        attemptPlay();
    }, 1000);
});
</script>

</body>
</html>
