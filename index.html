<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>x_x</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=2070&auto=format&fit=crop'); /* Dark forest background */
    background-size:cover;
    background-position:center;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
}

.container{
    display:flex;
    gap:40px;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

.profile{
    width:180px;
    height:220px;
    text-align:center;
    padding:20px;
    border-radius:20px;
    position:relative;
    background:rgba(0,0,0,0.8);
    border:3px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(5px);
    transition:transform 0.3s ease;
}

.profile:hover {
    transform:scale(1.05);
    border-color:rgba(255,255,255,0.4);
}

.pfp{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid white;
}

.name{
    color:white;
    font-size:20px;
    margin-top:15px;
    font-weight:bold;
    text-shadow:2px 2px 4px rgba(0,0,0,0.5);
    font-family: 'Courier New', monospace;
    white-space: nowrap;
    overflow: hidden;
    border-right: 2px solid white;
    animation: blink-cursor 0.75s step-end infinite;
}

@keyframes blink-cursor {
    from, to { border-color: transparent; }
    50% { border-color: white; }
}

/* Snowfall */
.snowflake {
    position: absolute;
    color: white;
    font-size: 1px;
    pointer-events: none;
    animation: snowfall linear infinite;
    opacity: 0.8;
    z-index:10;
}

@keyframes snowfall {
    0% {
        transform: translateY(-100vh) rotate(0deg);
        opacity: 1;
    }
    100% {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}

/* Hidden audio element */
#bgMusic {
    display:none;
}

/* Title animation */
.title-container {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: rgba(0,0,0,0.6);
    padding: 10px 20px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.2);
}

.title-text {
    color: white;
    font-size: 36px;
    font-weight: bold;
    font-family: 'Courier New', monospace;
    white-space: nowrap;
    overflow: hidden;
    border-right: 3px solid white;
    animation: blink-cursor 0.75s step-end infinite;
}
</style>
</head>

<body>
<!-- Snowfall container -->
<div id="snow-container"></div>

<!-- Title with typewriter effect -->
<div class="title-container">
    <div class="title-text" id="typewriter-title"></div>
</div>

<!-- Hidden Music Player (will be force-played) -->
<audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="container">
<div class="profile">
<img class="pfp" src="https://cdn.discordapp.com/avatars/602243853571063838/a352019ca90d767b57c98a93bed74e54.webp?size=1024">
<div class="name" id="name1">Emre</div>
</div>

<div class="profile">
<img class="pfp" src="https://cdn.discordapp.com/avatars/1420202850818064516/bafc5a1c05f4f615754c7a06cd906f4b.webp?size=1024">
<div class="name" id="name2">Charlie</div>
</div>

<div class="profile">
<img class="pfp" src="https://cdn.discordapp.com/avatars/1435059969241251880/e64ea35632e04fd2b2033d3da7f1ccce.webp?size=1024">
<div class="name" id="name3">Ethan</div>
</div>

<div class="profile">
<img class="pfp" src="https://cdn.discordapp.com/avatars/1412691167073538089/f79e8c7ac5ed47f64b4946677be6b548.webp?size=1024">
<div class="name" id="name4">Zes</div>
</div>
</div>

<script>
// Force play music immediately with multiple methods
const audio = document.getElementById('bgMusic');

// Method 1: Try to play immediately
audio.play().catch(e => console.log('Initial autoplay failed, trying other methods'));

// Method 2: Play on any user interaction (but we want it automatic, so this is backup)
document.addEventListener('click', function playOnClick() {
    audio.play();
}, { once: true });

// Method 3: Create a hidden user interaction to trigger play
window.addEventListener('load', function() {
    // Try to play every second for the first 5 seconds
    let attempts = 0;
    const playInterval = setInterval(() => {
        audio.play().then(() => {
            clearInterval(playInterval);
            console.log('Music started successfully');
        }).catch(e => {
            attempts++;
            if (attempts >= 10) clearInterval(playInterval);
        });
    }, 500);
    
    // Method 4: Use Web Audio API to unlock audio
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (AudioContext) {
            const audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => {
                    audio.play();
                });
            }
        }
    } catch (e) {
        console.log('Web Audio API not available');
    }
});

// Snowfall effect
function createSnowflake() {
    const snowflake = document.createElement('div');
    snowflake.className = 'snowflake';
    snowflake.innerHTML = '❄';
    snowflake.style.left = Math.random() * 100 + 'vw';
    snowflake.style.animationDuration = (Math.random() * 3 + 2) + 's';
    snowflake.style.opacity = Math.random() * 0.5 + 0.3;
    snowflake.style.fontSize = (Math.random() * 5 + 5) + 'px';
    document.getElementById('snow-container').appendChild(snowflake);
    
    setTimeout(() => {
        snowflake.remove();
    }, 5000);
}

setInterval(createSnowflake, 100);

// Typewriter effect for title (x_x repeating)
const titleElement = document.getElementById('typewriter-title');
const titleText = 'x_x ';
let titleIndex = 0;
let titleDisplay = '';

function typeWriterTitle() {
    if (titleIndex < titleText.length) {
        titleDisplay += titleText.charAt(titleIndex);
        titleElement.innerHTML = titleDisplay;
        titleIndex++;
        setTimeout(typeWriterTitle, 200);
    } else {
        // Reset and start over
        setTimeout(() => {
            titleDisplay = '';
            titleIndex = 0;
            typeWriterTitle();
        }, 500);
    }
}

// Start title typewriter effect
setTimeout(typeWriterTitle, 500);

// Typewriter effects for each profile name (continuous)
const names = [
    { element: document.getElementById('name1'), text: 'Emre ' },
    { element: document.getElementById('name2'), text: 'Charlie ' },
    { element: document.getElementById('name3'), text: 'Ethan ' },
    { element: document.getElementById('name4'), text: 'Zes ' }
];

// Store original names
names.forEach(name => {
    name.originalText = name.text;
});

// Typewriter function for a single name
function typeWriterName(nameObj) {
    let index = 0;
    let displayText = '';
    
    function type() {
        if (index < nameObj.text.length) {
            displayText += nameObj.text.charAt(index);
            nameObj.element.innerHTML = displayText;
            index++;
            setTimeout(type, 150);
        } else {
            // Pause then restart
            setTimeout(() => {
                displayText = '';
                index = 0;
                nameObj.element.innerHTML = '';
                type();
            }, 1000);
        }
    }
    
    type();
}

// Start typewriter effects for all names with staggered starts
names.forEach((name, i) => {
    setTimeout(() => {
        typeWriterName(name);
    }, i * 500); // Stagger the start of each name
});

// Error handling for audio file
audio.addEventListener('error', function(e) {
    console.error('Error loading audio file. Make sure song.mp3 is in the same folder.');
    // Try one more time with a different approach
    setTimeout(() => {
        audio.load();
        audio.play().catch(e => console.log('Still failed'));
    }, 1000);
});
</script>

</body>
</html>
